name: Publish Code Tunnel CLI

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  RUSTUP_TOOLCHAIN: "1.85"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build-linux-x64:
    name: Build CLI (Linux x64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libkrb5-dev

      - name: Install Rust
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain $RUSTUP_TOOLCHAIN
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set Rust version
        run: |
          set -e
          rustup default $RUSTUP_TOOLCHAIN
          rustup update $RUSTUP_TOOLCHAIN

      - name: Build CLI
        working-directory: cli
        run: cargo build --release --target x86_64-unknown-linux-gnu --bin=code
        env:
          VSCODE_CLI_COMMIT: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package CLI
        run: |
          set -e
          APP_NAME=$(node -p "require('./product.json').applicationName")
          mkdir -p staging
          cp cli/target/x86_64-unknown-linux-gnu/release/code "staging/$APP_NAME"
          tar -czf "vscode_cli_linux_x64.tar.gz" -C staging "$APP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode_cli_linux_x64
          path: vscode_cli_linux_x64.tar.gz
          if-no-files-found: error

  build-linux-arm64:
    name: Build CLI (Linux arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies
        run: |
          set -e
          sudo dpkg --add-architecture arm64
          # Add arm64 sources
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list || true
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y pkg-config gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev:arm64 libkrb5-dev:arm64

      - name: Install Rust
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain $RUSTUP_TOOLCHAIN
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set Rust version and add target
        run: |
          set -e
          rustup default $RUSTUP_TOOLCHAIN
          rustup update $RUSTUP_TOOLCHAIN
          rustup target add aarch64-unknown-linux-gnu

      - name: Build CLI
        working-directory: cli
        run: cargo build --release --target aarch64-unknown-linux-gnu --bin=code
        env:
          VSCODE_CLI_COMMIT: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          PKG_CONFIG_SYSROOT_DIR_aarch64_unknown_linux_gnu: /usr/aarch64-linux-gnu
          PKG_CONFIG_PATH_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig

      - name: Package CLI
        run: |
          set -e
          APP_NAME=$(node -p "require('./product.json').applicationName")
          mkdir -p staging
          cp cli/target/aarch64-unknown-linux-gnu/release/code "staging/$APP_NAME"
          tar -czf "vscode_cli_linux_arm64.tar.gz" -C staging "$APP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode_cli_linux_arm64
          path: vscode_cli_linux_arm64.tar.gz
          if-no-files-found: error

  build-linux-armhf:
    name: Build CLI (Linux armhf)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install system dependencies
        run: |
          set -e
          sudo dpkg --add-architecture armhf
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list || true
          echo "deb [arch=armhf] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/armhf.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/armhf.list
          sudo apt-get update
          sudo apt-get install -y pkg-config gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf libssl-dev:armhf libkrb5-dev:armhf

      - name: Install Rust
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain $RUSTUP_TOOLCHAIN
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set Rust version and add target
        run: |
          set -e
          rustup default $RUSTUP_TOOLCHAIN
          rustup update $RUSTUP_TOOLCHAIN
          rustup target add armv7-unknown-linux-gnueabihf

      - name: Build CLI
        working-directory: cli
        run: cargo build --release --target armv7-unknown-linux-gnueabihf --bin=code
        env:
          VSCODE_CLI_COMMIT: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          CXX_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-g++
          PKG_CONFIG_SYSROOT_DIR_armv7_unknown_linux_gnueabihf: /usr/arm-linux-gnueabihf
          PKG_CONFIG_PATH_armv7_unknown_linux_gnueabihf: /usr/lib/arm-linux-gnueabihf/pkgconfig

      - name: Package CLI
        run: |
          set -e
          APP_NAME=$(node -p "require('./product.json').applicationName")
          mkdir -p staging
          cp cli/target/armv7-unknown-linux-gnueabihf/release/code "staging/$APP_NAME"
          tar -czf "vscode_cli_linux_armhf.tar.gz" -C staging "$APP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode_cli_linux_armhf
          path: vscode_cli_linux_armhf.tar.gz
          if-no-files-found: error

  build-alpine-x64:
    name: Build CLI (Alpine x64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install musl build dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y build-essential musl-dev musl-tools linux-libc-dev pkgconf xutils-dev lld libssl-dev

      - name: Install Rust
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain $RUSTUP_TOOLCHAIN
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set Rust version and add target
        run: |
          set -e
          rustup default $RUSTUP_TOOLCHAIN
          rustup update $RUSTUP_TOOLCHAIN
          rustup target add x86_64-unknown-linux-musl

      - name: Build CLI
        working-directory: cli
        run: cargo build --release --target x86_64-unknown-linux-musl --bin=code
        env:
          VSCODE_CLI_COMMIT: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENSSL_STATIC: "1"

      - name: Package CLI
        run: |
          set -e
          APP_NAME=$(node -p "require('./product.json').applicationName")
          mkdir -p staging
          cp cli/target/x86_64-unknown-linux-musl/release/code "staging/$APP_NAME"
          tar -czf "vscode_cli_alpine_x64.tar.gz" -C staging "$APP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode_cli_alpine_x64
          path: vscode_cli_alpine_x64.tar.gz
          if-no-files-found: error

  build-alpine-arm64:
    name: Build CLI (Alpine arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install musl build dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y build-essential musl-dev musl-tools linux-libc-dev pkgconf xutils-dev lld libssl-dev
          sudo ln -s "/usr/bin/g++" "/usr/bin/musl-g++" || echo "link exists"

      - name: Install Rust
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain $RUSTUP_TOOLCHAIN
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set Rust version and add target
        run: |
          set -e
          rustup default $RUSTUP_TOOLCHAIN
          rustup update $RUSTUP_TOOLCHAIN
          rustup target add aarch64-unknown-linux-musl

      - name: Install aarch64 musl cross-compiler
        run: |
          set -e
          # Install the cross-compilation sysroot
          node -e '
            import { getVSCodeSysroot } from "./build/linux/debian/install-sysroot.ts";
            (async () => { await getVSCodeSysroot("arm64", true); })();
          '
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CLI
        working-directory: cli
        run: cargo build --release --target aarch64-unknown-linux-musl --bin=code
        env:
          VSCODE_CLI_COMMIT: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSCODE_SYSROOT_DIR: ${{ github.workspace }}/.build/sysroots
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: ${{ github.workspace }}/.build/sysroots/output/bin/aarch64-linux-musl-gcc
          CC_aarch64_unknown_linux_musl: ${{ github.workspace }}/.build/sysroots/output/bin/aarch64-linux-musl-gcc
          CXX_aarch64_unknown_linux_musl: ${{ github.workspace }}/.build/sysroots/output/bin/aarch64-linux-musl-g++
          OPENSSL_STATIC: "1"

      - name: Package CLI
        run: |
          set -e
          APP_NAME=$(node -p "require('./product.json').applicationName")
          mkdir -p staging
          cp cli/target/aarch64-unknown-linux-musl/release/code "staging/$APP_NAME"
          tar -czf "vscode_cli_alpine_arm64.tar.gz" -C staging "$APP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode_cli_alpine_arm64
          path: vscode_cli_alpine_arm64.tar.gz
          if-no-files-found: error

  build-macos-x64:
    name: Build CLI (macOS x64)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install Rust
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain $RUSTUP_TOOLCHAIN
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set Rust version and add target
        run: |
          set -e
          rustup default $RUSTUP_TOOLCHAIN
          rustup update $RUSTUP_TOOLCHAIN
          rustup target add x86_64-apple-darwin

      - name: Build CLI
        working-directory: cli
        run: cargo build --release --target x86_64-apple-darwin --bin=code
        env:
          VSCODE_CLI_COMMIT: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package CLI
        run: |
          set -e
          APP_NAME=$(node -p "require('./product.json').applicationName")
          mkdir -p staging
          cp cli/target/x86_64-apple-darwin/release/code "staging/$APP_NAME"
          cd staging && zip -r "../vscode_cli_darwin_x64.zip" "$APP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode_cli_darwin_x64
          path: vscode_cli_darwin_x64.zip
          if-no-files-found: error

  build-macos-arm64:
    name: Build CLI (macOS arm64)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install Rust
        run: |
          set -e
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain $RUSTUP_TOOLCHAIN
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set Rust version and add target
        run: |
          set -e
          rustup default $RUSTUP_TOOLCHAIN
          rustup update $RUSTUP_TOOLCHAIN
          rustup target add aarch64-apple-darwin

      - name: Build CLI
        working-directory: cli
        run: cargo build --release --target aarch64-apple-darwin --bin=code
        env:
          VSCODE_CLI_COMMIT: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package CLI
        run: |
          set -e
          APP_NAME=$(node -p "require('./product.json').applicationName")
          mkdir -p staging
          cp cli/target/aarch64-apple-darwin/release/code "staging/$APP_NAME"
          cd staging && zip -r "../vscode_cli_darwin_arm64.zip" "$APP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode_cli_darwin_arm64
          path: vscode_cli_darwin_arm64.zip
          if-no-files-found: error

  build-windows-x64:
    name: Build CLI (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install Rust
        shell: pwsh
        run: |
          rustup default $env:RUSTUP_TOOLCHAIN
          rustup update $env:RUSTUP_TOOLCHAIN
          rustup target add x86_64-pc-windows-msvc

      - name: Build CLI
        working-directory: cli
        shell: pwsh
        run: cargo build --release --target x86_64-pc-windows-msvc --bin=code
        env:
          VSCODE_CLI_COMMIT: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "-Ctarget-feature=+crt-static"

      - name: Package CLI
        shell: pwsh
        run: |
          $AppProductJson = Get-Content -Raw -Path "product.json" | ConvertFrom-Json
          $AppName = $AppProductJson.applicationName
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "cli/target/x86_64-pc-windows-msvc/release/code.exe" "staging/$AppName.exe"
          Compress-Archive -Path "staging/$AppName.exe" -DestinationPath "vscode_cli_win32_x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode_cli_win32_x64
          path: vscode_cli_win32_x64.zip
          if-no-files-found: error

  build-windows-arm64:
    name: Build CLI (Windows arm64)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install Rust
        shell: pwsh
        run: |
          rustup default $env:RUSTUP_TOOLCHAIN
          rustup update $env:RUSTUP_TOOLCHAIN
          rustup target add aarch64-pc-windows-msvc

      - name: Build CLI
        working-directory: cli
        shell: pwsh
        run: cargo build --release --target aarch64-pc-windows-msvc --bin=code
        env:
          VSCODE_CLI_COMMIT: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "-Ctarget-feature=+crt-static"

      - name: Package CLI
        shell: pwsh
        run: |
          $AppProductJson = Get-Content -Raw -Path "product.json" | ConvertFrom-Json
          $AppName = $AppProductJson.applicationName
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "cli/target/aarch64-pc-windows-msvc/release/code.exe" "staging/$AppName.exe"
          Compress-Archive -Path "staging/$AppName.exe" -DestinationPath "vscode_cli_win32_arm64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode_cli_win32_arm64
          path: vscode_cli_win32_arm64.zip
          if-no-files-found: error

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-linux-armhf
      - build-alpine-x64
      - build-alpine-arm64
      - build-macos-x64
      - build-macos-arm64
      - build-windows-x64
      - build-windows-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/vscode_cli_linux_x64/vscode_cli_linux_x64.tar.gz
            artifacts/vscode_cli_linux_arm64/vscode_cli_linux_arm64.tar.gz
            artifacts/vscode_cli_linux_armhf/vscode_cli_linux_armhf.tar.gz
            artifacts/vscode_cli_alpine_x64/vscode_cli_alpine_x64.tar.gz
            artifacts/vscode_cli_alpine_arm64/vscode_cli_alpine_arm64.tar.gz
            artifacts/vscode_cli_darwin_x64/vscode_cli_darwin_x64.zip
            artifacts/vscode_cli_darwin_arm64/vscode_cli_darwin_arm64.zip
            artifacts/vscode_cli_win32_x64/vscode_cli_win32_x64.zip
            artifacts/vscode_cli_win32_arm64/vscode_cli_win32_arm64.zip
